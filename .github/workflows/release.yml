name: Release Pipeline

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Check Gradle wrapper files
        run: |
          test -f gradlew
          test -f gradle/wrapper/gradle-wrapper.jar
          test -f gradle/wrapper/gradle-wrapper.properties

      - name: Run tests
        run: ./gradlew clean test --no-daemon

      - name: Build distributions
        run: ./gradlew distZip distTar --no-daemon

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/neuromafia:${{ github.ref_name }} .

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/neuromafia:${{ github.ref_name }}
          docker tag ghcr.io/${{ github.repository_owner }}/neuromafia:${{ github.ref_name }} ghcr.io/${{ github.repository_owner }}/neuromafia:latest
          docker push ghcr.io/${{ github.repository_owner }}/neuromafia:latest

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            build/distributions/* \
            README.md \
            misc/README_INSTRUCTIONS.md \
            --title "Neuromafia ${{ github.ref_name }}" \
            --generate-notes